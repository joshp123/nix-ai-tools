name: Auto-bump versions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Use and populate the binary cache
        uses: cachix/cachix-action@v17
        with:
          name: joshp123-nix-ai-tools
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Auto-bump packages (source builds run in CI)
        id: bump
        env:
          AUTO_BUMP_BUILD: "1"
          AUTO_BUMP_SYSTEM: "aarch64-darwin"
        run: ./scripts/auto-bump.sh

      - name: Commit and push
        if: steps.bump.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-bump" || exit 0
          git push

      - name: Report package failures
        if: steps.bump.outputs.has_failures == 'true'
        run: |
          echo "One or more packages failed to update or build. Green package updates were still published." >&2
          exit 1
